<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inserir Pessoa</title>
    <link rel="stylesheet" href="../assets/estilo-forms.css">
</head>
<body>
    <header>
        <h1>FORMULÁRIO ONLINE</h1>
    </header>

<main class="container">
        <div class="caixa-destaque">
            Inserir Dados - Pessoais
        </div>

        <h3>Formulário</h3>

        <form action="processar-form-pessoas.php" method="post" class="form-grid">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="containerNome" required>

            <label for="sobrenome">Sobrenome:</label>
            <input type="text" id="sobrenome" name="containerSobrenome" required>

            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="containerIdade" required>

            <label for="peso">Peso:</label>
            <input type="number" step="0.01" id="peso" name="containerPeso" required>

            <label for="altura">Altura:</label>
            <input type="number" step="0.01" id="altura" name="containerAltura" required>

            <div class="button-area">
                <button type="submit" class="btn-registrar">Registrar</button>
            </div>
        </form>
    </main>

    <footer>
        <hr>
        <div class="rodape-conteudo">
            Rodapé (Crédito - Desenvolvedores - Grupo de Pesquisa)
        </div>
    </footer>

</body>
</html>
</html>
